name: Mihoyo Auto Task

on:
  schedule:
    - cron: '0 0 * * *'   # 每天北京时间早上8点
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream (exclude main.py & workflows)
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote add upstream https://github.com/Womsxd/MihoyoBBSTools.git || true
          git fetch upstream
          files=$(git ls-tree -r upstream/master --name-only | grep -v '^main.py$' | grep -v '^.github/workflows/')
          git checkout upstream/master -- $files
          git add .
          git commit -m "Sync upstream (exclude main.py & workflows)" || echo "No changes to commit"
          git push origin main

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 运行脚本
        env:
          COOKIE: ${{ secrets.COOKIE }}
        run: |
          python main.py
